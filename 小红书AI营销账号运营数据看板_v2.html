<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书AI账号运行情况监控看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --red:#e8192c;--red2:#ff3b4e;--red-light:#fff1f2;--red-dark:#c41230;
  --blue:#2563eb;--green:#059669;--orange:#d97706;--purple:#7c3aed;
  --teal:#0891b2;--indigo:#4f46e5;
  --bg:#f4f5f7;--card:#fff;--border:#e5e7eb;
  --text:#111827;--text2:#374151;--muted:#9ca3af;
  --hh:60px;--th:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:300;
  background:linear-gradient(135deg,#b01020 0%,#e8192c 60%,#ff4b5c 100%);
  height:var(--hh);display:flex;align-items:center;padding:0 20px;
  box-shadow:0 2px 12px rgba(140,0,20,.45);
}
.hdr-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-icon{width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:15px;letter-spacing:-.5px;}
.hdr-title{color:#fff;font-size:16px;font-weight:700;}
.hdr-sub{color:rgba(255,255,255,.72);font-size:11px;margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-date{color:rgba(255,255,255,.72);font-size:11px;white-space:nowrap;}

/* Period toggle buttons – improved active state */
.ptg{display:flex;background:rgba(0,0,0,.18);border-radius:8px;padding:3px;gap:2px;}
.ptg-btn{
  background:transparent;color:rgba(255,255,255,.75);
  border:none;border-radius:6px;padding:4px 13px;
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap;
}
.ptg-btn:hover{background:rgba(255,255,255,.18);color:#fff;}
.ptg-btn.on{
  background:#fff;color:var(--red-dark);
  font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.25);
}

.hsel{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);
  border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer;outline:none;}
.hsel option{background:#c41230;color:#fff;}
.hdate-in{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);
  border-radius:7px;padding:4px 8px;font-size:12px;outline:none;cursor:pointer;color-scheme:dark;}
.hdate-in::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.8;cursor:pointer;}
.upd-btn{
  background:rgba(255,255,255,.15);color:#fff;
  border:1.5px solid rgba(255,255,255,.45);border-radius:8px;
  padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:all .18s;white-space:nowrap;
}
.upd-btn:hover{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.7);}
.apply-btn{
  background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);
  border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer;
  transition:background .15s;
}
.apply-btn:hover{background:rgba(255,255,255,.35);}
#fInput{display:none;}

/* ── PILL TABS ── */
.tnav{
  position:sticky;top:var(--hh);z-index:200;
  background:var(--bg);
  padding:8px 20px;
  display:flex;gap:6px;align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.tbtn{
  padding:7px 16px;font-size:12.5px;font-weight:500;
  border:1.5px solid var(--border);background:#fff;
  border-radius:100px;cursor:pointer;
  color:var(--muted);
  display:flex;align-items:center;gap:5px;
  transition:all .18s;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.tbtn:hover:not(.on){border-color:#d1d5db;color:var(--text2);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.tbtn.on{
  background:var(--red);border-color:var(--red);color:#fff;
  font-weight:700;box-shadow:0 3px 10px rgba(232,25,44,.35);
}
.tbtn .ticon{font-size:13px;}

/* ── LAYOUT ── */
.main{padding:16px 20px;max-width:1600px;margin:0 auto;}
.pane{display:none;}.pane.on{display:block;}
.gap{margin-bottom:16px;}
.r2{display:grid;grid-template-columns:3fr 2fr;gap:16px;}
.r2x{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px 18px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);}
.ctitle{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;
  display:flex;align-items:center;gap:6px;}
.sh{font-size:13px;font-weight:700;color:var(--text);
  border-left:3px solid var(--red);padding-left:10px;
  display:flex;align-items:center;gap:8px;}
.sh .sub{font-weight:400;color:var(--muted);font-size:12px;}
.sh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cmp-toggle{background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:4px 14px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;}
.cmp-toggle:hover{border-color:var(--red);color:var(--red);}
.cmp-toggle.on{background:var(--red-light);border-color:var(--red);color:var(--red);font-weight:600;}

/* ── OVERVIEW KPI GRID ── */
.kgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
.kcard{
  background:#fff;border-radius:12px;border:1px solid var(--border);
  padding:18px 14px 14px;position:relative;overflow:hidden;
  text-align:center;
  transition:box-shadow .2s;box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.kcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.09);}
.ktop{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kicon{font-size:22px;margin-bottom:6px;}
.klabel{font-size:11px;color:var(--muted);margin-bottom:4px;
  display:flex;align-items:center;justify-content:center;gap:4px;}
.kcore-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:3px;}
.kval{font-size:24px;font-weight:800;line-height:1.1;}
.kval .ku{font-size:12px;font-weight:400;color:var(--muted);margin-left:2px;}
.kchg{font-size:11px;display:flex;align-items:center;justify-content:center;
  gap:3px;font-weight:600;margin-top:5px;}
.kchg.up{color:var(--green);}.kchg.dn{color:var(--red);}.kchg.fl{color:var(--muted);font-weight:400;}
/* 带看/成交/速览 banners row */
.bk-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.bk-card{
  border-radius:12px;padding:14px 16px;border:1px solid transparent;
  position:relative;overflow:hidden;
}
.bk-card.daikan{
  background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);
  border-color:#bfdbfe;
}
.bk-card.chengjiao{
  background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%);
  border-color:#bbf7d0;
}
.bk-card-title{font-size:12px;font-weight:700;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;}
.bk-card.daikan .bk-card-title{color:#1d4ed8;}
.bk-card.chengjiao .bk-card-title{color:#15803d;}
.bk-num{font-size:30px;font-weight:900;line-height:1;}
.bk-card.daikan .bk-num{color:#2563eb;}
.bk-card.chengjiao .bk-num{color:#16a34a;}
.bk-unit{font-size:12px;font-weight:400;color:#6b7280;margin-left:3px;}
.bk-sub{font-size:11px;color:#6b7280;margin-top:4px;}
.bk-detail{margin-top:8px;border-top:1px solid rgba(0,0,0,.06);padding-top:8px;}
.bk-deal{font-size:11px;color:#374151;padding:3px 0;
  display:flex;align-items:start;gap:6px;}
.bk-deal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.bk-card.daikan .bk-deal-dot{background:#3b82f6;}
.bk-card.chengjiao .bk-deal-dot{background:#22c55e;}
.bk-card.summary{
  background:linear-gradient(135deg,#fafafa 0%,#f3f4f6 100%);
  border-color:#e5e7eb;
}
.bk-card.summary .bk-card-title{color:var(--text2);}
.sum-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f0f1f3;}
.sum-row:last-of-type{border-bottom:none;}
.sum-label{font-size:11px;color:var(--muted);flex:1;}
.sum-val{font-size:15px;font-weight:800;line-height:1;}
.sum-chg{font-size:11px;font-weight:600;}
.sum-divider{height:1px;background:#e5e7eb;margin:8px 0 6px;}
.sum-trend{display:flex;align-items:center;gap:6px;font-size:11px;
  color:var(--text2);margin-bottom:8px;}
.sum-minibar{display:flex;align-items:flex-end;gap:5px;height:36px;}

/* ── FUNNEL ── */
.fw{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.fw.single{grid-template-columns:1fr;}
.fhdr{font-size:11px;font-weight:700;color:#fff;padding:4px 10px;
  border-radius:6px;margin-bottom:8px;text-align:center;}
.fhdr.prev{background:#9ca3af;}.fhdr.curr{background:var(--red);}
.frow{margin-bottom:8px;}
.frl{font-size:11px;color:var(--text2);margin-bottom:3px;
  display:flex;justify-content:space-between;}
.frl .rt{color:var(--muted);font-size:10px;}
.fbg{background:#f3f4f6;border-radius:3px;height:20px;overflow:hidden;}
.fbf{height:100%;border-radius:3px;display:flex;align-items:center;
  justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;
  color:#fff;min-width:2%;transition:width .5s;}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.chip-lbl{font-size:12px;color:var(--muted);flex-shrink:0;margin-right:2px;}
.chip{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;
  font-size:12px;cursor:pointer;border:1px solid var(--border);
  background:#fff;color:var(--text2);transition:all .15s;white-space:nowrap;user-select:none;}
.chip:hover{border-color:var(--red);color:var(--red);}
.chip.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:500;}

/* ── TABLES ── */
.tw{overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt th{background:#f9fafb;padding:8px 12px;text-align:left;font-weight:600;
  font-size:11px;color:#6b7280;border-bottom:1px solid var(--border);white-space:nowrap;}
table.dt td{padding:9px 12px;border-bottom:1px solid #f3f4f6;color:var(--text2);}
table.dt tr:last-child td{border-bottom:none;}
table.dt tr:hover td{background:#fafafa;}
.bk{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.br{background:#fff1f2;color:var(--red);}
.bb{background:#eff6ff;color:var(--blue);}
.bg{background:#f0fdf4;color:var(--green);}
.bgy{background:#f3f4f6;color:#6b7280;}
.by{background:#fffbeb;color:#92400e;}
.hi{color:var(--red);font-weight:700;}.hig{color:var(--green);font-weight:700;}
.n0{color:#d1d5db;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.don{background:#22c55e;}.doff{background:#d1d5db;}
.rk{display:inline-flex;width:18px;height:18px;border-radius:50%;
  align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-right:2px;}
.rk1{background:#fef3c7;color:#b45309;}
.rk2{background:#f3f4f6;color:#374151;}
.rk3{background:#fef3c7;color:#78350f;opacity:.7;}

/* ── INSIGHT ── */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.iitem{background:#f9fafb;border-radius:8px;padding:14px 16px;border:1px solid var(--border);}
.iitem h4{font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;}
.iitem p,.iitem li{font-size:12px;color:#4b5563;line-height:1.75;}
.iitem ul{list-style:none;}
.iitem li::before{content:"· ";color:var(--red);font-weight:700;}
.tup{color:var(--green);font-weight:700;}.tdn{color:var(--red);font-weight:700;}
.thi{color:var(--blue);font-weight:700;}
/* ── 表格模式切换 Tab ── */
.tbl-tabs{display:flex;gap:4px;}
.tbl-tab{padding:4px 14px;border-radius:100px;border:1px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;background:#f9fafb;color:#6b7280;transition:.15s;}
.tbl-tab.on{background:var(--red);color:#fff;border-color:var(--red);}

/* ── DIM ── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
canvas{max-height:240px;}

/* ── LOADING ── */
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.75);
  align-items:center;justify-content:center;z-index:9999;}
.spin{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--red);
  border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .kgrid{grid-template-columns:repeat(3,1fr);}
  .bk-row{grid-template-columns:1fr 1fr;}
  .r2,.r2x,.dgrid{grid-template-columns:1fr;}
  .igrid{grid-template-columns:1fr 1fr;}
}
@media(max-width:800px){
  .kgrid{grid-template-columns:repeat(2,1fr);}
  .bk-row{grid-template-columns:1fr;}
  .igrid{grid-template-columns:1fr;}
}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spin"></div></div>
<input type="file" id="fInput" accept=".csv">

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">书</div>
    <div>
      <div class="hdr-title">小红书AI账号运行情况监控看板</div>
      <div class="hdr-sub" id="hSub">城市：武汉市 · 账号数：122个 · 数据来源：系统导出</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="hdr-date" id="hDate">数据更新：2026-06-07</span>
    <div class="ptg">
      <button class="ptg-btn on" id="bW" onclick="setPT('week')">按周</button>
      <button class="ptg-btn"    id="bM" onclick="setPT('month')">按月</button>
      <button class="ptg-btn"    id="bC" onclick="setPT('custom')">自定义</button>
    </div>
    <select class="hsel" id="pSel" onchange="onPC()"><option>—</option></select>
    <div id="custRange" style="display:none;align-items:center;gap:6px;">
      <input type="date" class="hdate-in" id="custStart">
      <span style="color:rgba(255,255,255,.5);font-size:11px;">—</span>
      <input type="date" class="hdate-in" id="custEnd">
      <button class="apply-btn" onclick="applyCust()">应用</button>
    </div>
    <button class="upd-btn" onclick="document.getElementById('fInput').click()">
      <span>⬆</span><span>更新数据</span>
    </button>
  </div>
</header>

<!-- PILL TABS -->
<nav class="tnav" id="tnav">
  <button class="tbtn on" data-t="overview"  onclick="ST(this)"><span class="ticon">📊</span>整体概览</button>
  <button class="tbtn"    data-t="trend"     onclick="ST(this)"><span class="ticon">📈</span>趋势分析</button>
  <button class="tbtn"    data-t="district"  onclick="ST(this)"><span class="ticon">🏙</span>商圈维度</button>
  <button class="tbtn"    data-t="agent"     onclick="ST(this)"><span class="ticon">👤</span>选房师维度</button>
  <button class="tbtn"    data-t="account"   onclick="ST(this)"><span class="ticon">📱</span>账号明细</button>
  <button class="tbtn"    data-t="compare"   onclick="ST(this)"><span class="ticon">🔀</span>对比分析</button>
  <button class="tbtn"    data-t="insight"   onclick="ST(this)"><span class="ticon">💡</span>数据洞察</button>
</nav>

<div class="main">

  <!-- 整体概览 -->
  <div class="pane on" id="pane-overview">
    <div class="sh-row gap">
      <div class="sh">本周期核心指标 <span class="sub" id="cmpLbl"></span></div>
      <button class="cmp-toggle" id="cmpToggle" onclick="toggleCmp()">开启对比</button>
    </div>
    <!-- KPI 6列横向卡片 -->
    <div class="kgrid gap" id="kgrid"></div>
    <!-- 带看 / 成交 / 数据速览 三列 banners -->
    <div class="bk-row gap">
      <div class="card bk-card daikan">
        <div class="bk-card-title"><span>🏠</span> 带看情况</div>
        <div><span class="bk-num" id="dkNum">—</span><span class="bk-unit">组</span></div>
        <div class="bk-sub" id="dkSub">加载中…</div>
        <div class="bk-detail" id="dkDetail"></div>
      </div>
      <div class="card bk-card chengjiao">
        <div class="bk-card-title"><span>✅</span> 成交情况</div>
        <div><span class="bk-num" id="cjNum">—</span><span class="bk-unit">套</span></div>
        <div class="bk-sub" id="cjSub">加载中…</div>
        <div class="bk-detail" id="cjDetail"></div>
      </div>
      <div class="bk-card summary" id="summaryCard"></div>
    </div>
    <!-- 六大指标 + 转化漏斗 -->
    <div class="r2 gap">
      <div class="card">
        <div class="ctitle">🏆 六大指标概览</div>
        <canvas id="cmpChart"></canvas>
      </div>
      <div class="card">
        <div class="ctitle">🔽 转化漏斗</div>
        <div id="funnelBox"></div>
      </div>
    </div>
  </div>

  <!-- 趋势分析 -->
  <div class="pane" id="pane-trend">
    <div class="card gap">
      <div class="ctitle">📉 关键指标周趋势</div>
      <canvas id="trendChart"></canvas>
    </div>
    <div class="card gap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="ctitle" style="margin-bottom:0">📋 各周数据汇总</div>
        <div class="tbl-tabs">
          <button class="tbl-tab on" id="tabTotal" onclick="switchTblTab('total')">总量</button>
          <button class="tbl-tab" id="tabAvg" onclick="switchTblTab('avg')">号均</button>
        </div>
      </div>
      <div id="trendTbl" class="tw"></div>
    </div>
  </div>

  <!-- 商圈 -->
  <div class="pane" id="pane-district">
    <div class="filter-row" id="distFilterRow"></div>
    <div class="dgrid gap">
      <div class="card"><div class="ctitle">商圈指标对比</div>
        <canvas id="cDist" style="max-height:260px"></canvas></div>
      <div class="card"><div class="ctitle">商圈数据明细</div>
        <div id="tDist" class="tw"></div></div>
    </div>
  </div>

  <!-- 选房师 -->
  <div class="pane" id="pane-agent">
    <div class="filter-row" id="agentFilterRow"></div>
    <div class="dgrid gap">
      <div class="card"><div class="ctitle">选房师指标对比</div>
        <canvas id="cAgent" style="max-height:260px"></canvas></div>
      <div class="card"><div class="ctitle">选房师数据明细</div>
        <div id="tAgent" class="tw"></div></div>
    </div>
  </div>

  <!-- 账号明细 -->
  <div class="pane" id="pane-account">
    <div class="card gap">
      <div class="ctitle">账号级数据明细 <span style="font-weight:400;color:var(--muted);font-size:12px;" id="acCnt"></span></div>
      <div id="tAcct" class="tw"></div>
    </div>
  </div>

  <!-- 对比分析 -->
  <div class="pane" id="pane-compare">
    <div class="card gap">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;">
        <span style="font-size:13px;font-weight:700;color:var(--text2);">🔀 对比分析</span>
        <div style="display:flex;align-items:center;gap:6px;margin-left:8px;">

document.getElementById('fInput').addEventListener('change',e=>{

function lf(file){
  document.getElementById('loading').style.display='flex';
  // 先尝试 UTF-8，失败或无有效行则 fallback 到 GBK
  function tryLoad(enc, onFail){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const rows=parseCSV(e.target.result);
        const parsed=rows.map(pr).filter(Boolean);
        if(!parsed.length){
          if(onFail){ onFail(); return; }
          throw new Error('未找到有效数据，请确认上传的是系统导出的 CSV 文件，或检查列名是否正确');
        }
        D=parsed;
        initDB(file.name);
      }catch(err){
        if(onFail&&err.message!=='文件内容为空'){ onFail(); return; }
        alert('⚠ '+err.message);
      }finally{
        document.getElementById('loading').style.display='none';
        document.getElementById('fInput').value='';
      }
    };
    r.readAsText(file, enc);
  }
  tryLoad('utf-8', ()=>tryLoad('gbk', null));
}

function parseCSV(txt){
  if(txt.charCodeAt(0)===0xFEFF) txt=txt.slice(1);
  const lines=txt.trim().split(/\r?\n/);
  if(lines.length<2) throw new Error('文件内容为空');
  const hs=csvL(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const c=csvL(l),o={};hs.forEach((h,i)=>o[h.trim()]=(c[i]||'').trim());return o;
  });
}
function csvL(line){
  const res=[];let inQ=false,cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=c;
  }
  res.push(cur);return res;
}
function normDate(s){
  // 将 "2026/3/9" 或 "2026-3-9" 统一转为 "2026-03-09"
  const m=String(s||'').trim().match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(!m) return String(s||'').trim();
  return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
}
function pr(r){

}

// ── PERIOD LOGIC ──
function toYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function monOf(ds){const d=new Date(ds+'T12:00:00'),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return toYMD(d);}
function addD(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return toYMD(d);}
function fd(ds){const[,m,d]=ds.split('-');return `${parseInt(m)}.${parseInt(d)}`;}
function makeWPs(data){
  const dates=[...new Set(data.map(r=>r.date))].sort();
  if(!dates.length) return[];
  let mon=monOf(dates[0]);const last=dates[dates.length-1];const ps=[];
  while(mon<=last){
    const sun=addD(mon,6);
    if(data.some(r=>r.date>=mon&&r.date<=sun))
      ps.push({start:mon,end:sun,label:`${fd(mon)}-${fd(sun)}`,type:'week'});
    mon=addD(mon,7);
  }
  return ps.reverse();
}
function makeMPs(data){
  const ms=[...new Set(data.map(r=>r.date.slice(0,7)))].sort().reverse();
  return ms.map(ym=>{
    const[y,m]=ym.split('-');const end=toYMD(new Date(+y,+m,0));
    return{start:`${ym}-01`,end,label:`${parseInt(m)}月`,type:'month'};
  });
}
function fp(data,p){return data.filter(r=>r.date>=p.start&&r.date<=p.end);}
function getCurPeriod(){
  if(PT==='custom'&&CUST.start&&CUST.end)
    return{start:CUST.start,end:CUST.end,label:`${fd(CUST.start)}-${fd(CUST.end)}`,type:'custom'};
  return PS[CI]||{start:'2000-01-01',end:'2099-12-31',label:'—',type:'week'};
}

// ── AGGREGATION ──
function agg(rows){
  if(!rows||!rows.length) return null;
  const s=f=>rows.reduce((a,r)=>a+(r[f]||0),0);
  const leads=s('leads'),active=s('active'),inbound=s('inbound');
  return{accountCount:new Set(rows.map(r=>r.accountNum)).size,
    planned:s('planned'),actual:s('actual'),inbound,active,intent:s('intent'),leads,
    conv:active>0?+(leads/active*100).toFixed(2):0,
    in2open:inbound>0?+(active/inbound*100).toFixed(1):0};
}
function gbk(data,fn){
  const m={};
  data.forEach(r=>{const k=fn(r);if(!m[k])m[k]=[];m[k].push(r);});
  return Object.fromEntries(Object.entries(m).map(([k,v])=>[k,agg(v)]));
}

function rKPIs(c,p){

    {k:'inbound',lb:'私信进线用户量', u:'人',ic:'💬',core:false,col:'#d97706'},

    {k:'leads',  lb:'留资量',         u:'人',ic:'✅',core:true, col:'#059669'},
    {k:'conv',   lb:'留资转化率',     u:'%', ic:'📊',core:false,col:'#0891b2',rate:true},
  ];
  document.getElementById('kgrid').innerHTML=defs.map(d=>{
    const v=c[d.k]||0,pv=p?(p[d.k]||0):null;
    const dv=d.rate?v.toFixed(2):v.toLocaleString();
    let ch='';
    if(pv!==null){
      if(pv>0){
        const pc=((v-pv)/pv*100).toFixed(1),up=v>=pv;
        const delta=d.rate?`${Math.abs((v-pv).toFixed(2))}pp`:`${Math.abs(pc)}%`;
        ch=`<div class="kchg ${up?'up':'dn'}">${up?'▲':'▼'} ${delta} 较上期</div>`;
      }else if(v>0){ch='<div class="kchg up">▲ 新增产出</div>';}
      else{ch='<div class="kchg fl">— 与上期持平</div>';}
    }
    return`<div class="kcard">
      <div class="ktop" style="background:${d.col}"></div>
      <div class="kicon">${d.ic}</div>
      <div class="klabel">${d.lb}${d.core?'<span class="kcore-badge">核心</span>':''}</div>
      <div class="kval" style="color:${d.col}">${dv}<span class="ku">${d.u}</span></div>
      ${ch}
    </div>`;
  }).join('');
}

function rSummary(cA,pA,allD,cp){
  const leads=cA.leads||0,conv=cA.conv||0;

  const pubRate=planned>0?(actual/planned*100).toFixed(0):null;
  // 与上期对比
  function chgBadge(cur,prev,unit,isRate){
    if(prev===undefined||prev===null) return '';
    if(prev<=0) return cur>0?`<span class="sum-chg" style="color:var(--green)">新增</span>`:'';
    const delta=cur-prev;
    const pct=isRate?Math.abs(delta).toFixed(2)+unit:Math.abs((delta/prev*100).toFixed(1))+'%';
    const up=delta>=0;
    return `<span class="sum-chg" style="color:${up?'#059669':'#e8192c'}">${up?'▲':'▼'} ${pct}</span>`;
  }
  const leadsChg=pA?chgBadge(leads,pA.leads,''):'';
  const convChg=pA?chgBadge(conv,pA.conv,'pp',true):'';
  // 近3周留资趋势
  const wps=makeWPs(allD).reverse();
  const wl=wps.slice(-3).map(p=>(agg(fp(allD,p))||{}).leads||0);

  const trendUp=wl.length>=2&&wl[wl.length-1]>=wl[0];
  const wlLabels=wps.slice(-3).map(p=>p.label);
  const bars=wl.map((v,i)=>{
    const h=Math.max(Math.round(v/maxW*32),2);

    return`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;">
      <span style="font-size:9px;color:${isLast?'var(--text)':'var(--muted)'};">${v}</span>

    </div>`;
  }).join('');
  // 活跃账号数
  const cD=fp(allD,cp);
  const activeAccts=new Set(cD.filter(r=>r.leads>0||r.active>0).map(r=>r.accountNum)).size;

    <div class="bk-card-title"><span>📋</span> 本周数据速览</div>
    <div class="sum-row">
      <span class="sum-label">📊 留资量</span>
      <span class="sum-val" style="color:#059669">${leads}<span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:2px">人</span></span>
      ${leadsChg}
    </div>
    <div class="sum-row">
      <span class="sum-label">🔄 留资转化率</span>
      <span class="sum-val" style="color:#0891b2">${conv.toFixed(1)}<span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:1px">%</span></span>
      ${convChg}
    </div>
    ${pubRate!==null?`<div class="sum-row">
      <span class="sum-label">✍️ 发布完成率</span>
      <span class="sum-val" style="color:${parseFloat(pubRate)>=80?'#059669':'#d97706'}">${pubRate}<span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:1px">%</span></span>
      <span class="sum-chg" style="color:var(--muted);font-size:10px">${actual}/${planned}</span>
    </div>`:''}
    <div class="sum-row">
      <span class="sum-label">📱 有效账号</span>
      <span class="sum-val" style="color:#7c3aed">${activeAccts}<span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:2px">/${totalAccts}</span></span>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-trend">
      <span style="font-size:14px">${trendUp?'📈':'📉'}</span>
      <span>近三周留资&nbsp;<strong style="color:${trendUp?'#059669':'#e8192c'}">${trendUp?'持续上升':'出现波动'}</strong></span>
    </div>
    <div class="sum-minibar" style="display:flex;align-items:flex-end;gap:4px;padding-top:2px;">${bars}</div>
  `;
}

function rDkCj(cp){
  // 带看：按日期范围过滤 DK_DATA
  const dkRows = DK_DATA.filter(r => r.start >= cp.start && r.start <= cp.end || r.end >= cp.start && r.end <= cp.end);
  const dkTotal = dkRows.reduce((a,r)=>a+r.count,0);
  const dkAll = DK_DATA.reduce((a,r)=>a+r.count,0);
  document.getElementById('dkNum').textContent = dkTotal;
  document.getElementById('dkSub').textContent = `当前周期 ${dkTotal} 组，累计 ${dkAll} 组`;
  // 带看明细：按选房师汇总
  const dkMap = {};
  dkRows.forEach(r=>{
    const key=`${r.agent}（${r.district}）`;
    dkMap[key]=(dkMap[key]||0)+r.count;
  });
  const dkDetailHtml = Object.entries(dkMap).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="bk-deal">
      <div class="bk-deal-dot"></div>
      <div><strong>${k}</strong> ${v} 组</div>
    </div>`).join('');
  document.getElementById('dkDetail').innerHTML = dkDetailHtml||'<div style="font-size:11px;color:#9ca3af;padding-top:2px">当前周期暂无带看记录</div>';
  // 成交：按日期过滤 CJ_DATA
  const cjRows = CJ_DATA.filter(r => r.date >= cp.start && r.date <= cp.end);
  const cjTotal = cjRows.reduce((a,r)=>a+r.count,0);
  const cjAll = CJ_DATA.reduce((a,r)=>a+r.count,0);
  const cjAmt = CJ_DATA.reduce((a,r)=>{
    const m=parseInt(r.amount);return isNaN(m)?a:a+m;
  },0);
  document.getElementById('cjNum').textContent = cjTotal||'0';
  document.getElementById('cjSub').textContent = cjTotal
    ? `当前周期 ${cjTotal} 套 | 累计 ${cjAll} 套，总金额 ${cjAmt} 万`
    : `当前周期暂无成交 | 累计 ${cjAll} 套，总金额 ${cjAmt} 万`;
  document.getElementById('cjDetail').innerHTML = CJ_DATA.map(r=>`
    <div class="bk-deal">
      <div class="bk-deal-dot"></div>
      <div><strong>${r.date.slice(5).replace('-','/')} ${r.agent}</strong>（${r.district}）${r.project}，成交 ${r.amount}
      <br><span style="color:#9ca3af;font-size:10px;">${r.cycle}</span></div>
    </div>`).join('');
}

// ── 转化漏斗 ──
function rFunnel(cD,pD,cLbl,pLbl){
  const ca=agg(cD)||{actual:0,inbound:0,active:0,intent:0,leads:0};
  const pa=CMP_ON&&pD.length?agg(pD):null;
  function fcol(a,col){
    const metrics=[
      {lb:'任务发布',v:a.actual,  rate:null},
      {lb:'私信进线',v:a.inbound, rate:a.actual>0?a.inbound/a.actual:0},
      {lb:'私信开口',v:a.active,  rate:a.inbound>0?a.active/a.inbound:0},
      {lb:'意向评论',v:a.intent,  rate:a.active>0?a.intent/a.active:0},
      {lb:'留资',    v:a.leads,   rate:a.intent>0?a.leads/a.intent:0},
    ];
    const base=a.actual||1;
    return metrics.map(m=>{
      const pct=Math.min(m.v/base*100,110);
      const rs=m.rate!==null?`(${(m.rate*100).toFixed(0)}%)`:' ';
      return`<div class="frow">
        <div class="frl"><span>${m.lb} <strong>${m.v}</strong></span><span class="rt">${rs}</span></div>
        <div class="fbg"><div class="fbf" style="width:${pct}%;background:${col}">${m.v>0&&pct>15?m.v:''}</div></div>
      </div>`;
    }).join('');
  }
  if(pa){
    document.getElementById('funnelBox').innerHTML=`
      <div class="fw">
        <div><div class="fhdr prev">${pLbl}（上期）</div>${fcol(pa,'#9ca3af')}</div>
        <div><div class="fhdr curr">${cLbl}（本期）</div>${fcol(ca,'#e8192c')}</div>
      </div>`;
  }else{
    document.getElementById('funnelBox').innerHTML=`
      <div class="fw single">
        <div><div class="fhdr curr">${cLbl}</div>${fcol(ca,'#e8192c')}</div>
      </div>`;
  }
}
